name: Feature
description: 구현할 기능이나 개선 작업을 정리합니다
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: 이 이슈가 완료되면 무엇이 가능해야 하는지 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: 완료 여부를 확인할 수 있는 동작이나 검증 방법을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: 데이터셋, 모델링, 보안, 구현 관련 참고사항을 작성해 주세요.
