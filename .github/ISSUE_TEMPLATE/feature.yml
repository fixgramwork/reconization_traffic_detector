name: Feature
description: Plan a focused implementation task
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be possible after this issue is complete?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: What checks or behavior prove this is complete?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Dataset, modeling, security, or implementation details.
