name: Bug
description: 잘못된 동작이나 오류를 제보합니다
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: 실제로 어떤 일이 발생했는지 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: 원래 기대한 동작을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: 실행한 명령어, 입력 파일, 오류 출력 등을 작성해 주세요.
    validations:
      required: true
